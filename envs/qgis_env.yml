name: qgis_env
channels:
  - conda-forge/label/qgis_ltr
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - qgis

  # Workflow / reproducibilidad
  - snakemake
  - pytest
  - setuptools

  # Base numérica y tabular
  - numpy
  - pandas
  - scipy
  - statsmodels
  - scikit-learn
  - pyarrow

  # Geoespacial vectorial/raster
  - geopandas
  - rasterio
  - rasterstats
  - pyogrio
  - shapely
  - pyproj
  - gdal

  # Raster multidimensional / NetCDF
  - xarray
  - rioxarray
  - dask
  - netcdf4

  # Visualización y reportes
  - matplotlib
  - ydata-profiling

  # Lectura de tablas auxiliares, incluyendo VAT .dbf asociadas a raster categóricos
  - dbfread
